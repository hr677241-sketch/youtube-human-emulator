name: Auto Proxy Updater

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-proxies:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install requests
        
    - name: Fetch and validate proxies
      run: |
        python scripts/auto_proxy_updater.py --once
        
    - name: Upload working proxies
      uses: actions/upload-artifact@v3
      with:
        name: working-proxies
        path: data/proxies/working_proxies.txt
        
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/proxies/working_proxies.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update proxies"
        git push